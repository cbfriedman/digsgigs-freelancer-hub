<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Viewport Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Theme & Branding -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="author" content="digsandgigs" />
    <meta name="application-name" content="digsandgigs" />
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Favicon (set dynamically from assets in main.tsx) -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Default meta tags (will be overridden by page-specific SEO) -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Content Security Policy - Allows Stripe, Google Analytics, and Facebook Pixel -->
    <!-- Note: frame-ancestors directive cannot be set via meta tag and must be configured via HTTP headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://js.stripe.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co wss://*.supabase.in https://m.stripe.network https://m.stripe.com https://stripe.com https://api.stripe.com https://js.stripe.com https://hooks.stripe.com https://www.googletagmanager.com https://www.google-analytics.com https://www.facebook.com https://*.facebook.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://m.stripe.network https://m.stripe.com https://www.facebook.com https://*.facebook.com; object-src 'none'; base-uri 'self'; form-action 'self' https://www.facebook.com https://*.facebook.com; upgrade-insecure-requests;" />
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-00EYW9BT0H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-00EYW9BT0H', {
        send_page_view: true,
        cookie_flags: 'SameSite=None;Secure'
      });
    </script>
    
    <!-- Meta Pixel Base Code - Will be initialized by useFacebookPixel hook if VITE_FB_PIXEL_ID is set -->
    <!-- Base pixel structure is initialized here for all pages, actual pixel ID comes from env var in React -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
