          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  <!-- Text: Digs & Gigs -->
  <text x="110" y="65" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#1f2937">
    Digs <tspan fill="#6d28d9">&amp;</tspan> Gigs
