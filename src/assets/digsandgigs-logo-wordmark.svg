<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Icon Circle -->
  <circle cx="20" cy="20" r="18" fill="#3B2055"/>
  
  <!-- Handshake Icon - Two hands meeting -->
  <!-- Left hand (white) -->
  <path d="M10 22 L14 18 L17 18 L19 20 L17 22 L14 22 Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M14 18 L14 15 Q14 14 15 14 L17 14" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- Right hand (orange) -->
  <path d="M30 22 L26 18 L23 18 L21 20 L23 22 L26 22 Z" fill="#F26B28" stroke="#F26B28" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M26 18 L26 15 Q26 14 25 14 L23 14" stroke="#F26B28" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- Handshake clasp in center -->
  <ellipse cx="20" cy="20" rx="4" ry="3" fill="white" stroke="#F26B28" stroke-width="1"/>
  
  <!-- Text: Digs & Gigs -->
  <text x="46" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#3B2055">Digs</text>
  <text x="88" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F26B28">&amp;</text>
  <text x="104" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#3B2055">Gigs</text>
</svg>