<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <defs>
    <linearGradient id="fullPurpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon Group -->
  <g transform="translate(0, 0)">
    <circle cx="60" cy="60" r="50" fill="url(#fullPurpleGrad)"/>
    <circle cx="40" cy="40" r="8" fill="white"/>
    <circle cx="80" cy="80" r="8" fill="#f97316"/>
    <path d="M 40 40 C 55 57 65 63 80 80"
          stroke="white"
          stroke-width="5"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  <!-- Text: Digs & Gigs -->
  <text x="130" y="65" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#1f2937">
    Digs <tspan fill="#6d28d9">&amp;</tspan> Gigs
  </text>
  <!-- Tagline -->
  <text x="130" y="95" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">
    Where Opportunity Meets Talent
  </text>
</svg>
