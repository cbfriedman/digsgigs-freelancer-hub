<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Circle - Dark Purple -->
  <circle cx="50" cy="50" r="50" fill="#6d28d9"/>
  
  <!-- White Circle (upper-left quadrant) -->
  <circle cx="30" cy="30" r="8" fill="white"/>
  
  <!-- White Arc (thick curved line - starts near white circle, curves up then down to orange) -->
  <path d="M 38 38 Q 50 25 60 30 Q 70 35 75 50 Q 75 60 70 70" 
        stroke="white" 
        stroke-width="7" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Orange Circle (lower-right quadrant) -->
  <circle cx="70" cy="70" r="6" fill="#f97316"/>
</svg>

