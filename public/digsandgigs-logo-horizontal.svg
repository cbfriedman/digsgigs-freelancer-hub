<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(0, 0)">
    <!-- Background Circle with Purple Gradient -->
    <circle cx="60" cy="60" r="50" fill="url(#purpleGrad)"/>
    
    <!-- White Dot (upper-left) -->
    <circle cx="40" cy="40" r="8" fill="white"/>
    
    <!-- Orange Dot (lower-right) -->
    <circle cx="80" cy="80" r="8" fill="#f97316"/>
    
    <!-- Wavy S-shaped connecting line -->
    <path d="M 40 40 Q 55 57 60 60 Q 65 63 80 80" 
          stroke="white" 
          stroke-width="5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="130" y="75" font-family="Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#1f2937">
    Digs 
    <tspan fill="#2563eb">&amp;</tspan>
    <tspan fill="#1f2937"> Gigs</tspan>
  </text>
</svg>
